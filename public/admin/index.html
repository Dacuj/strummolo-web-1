<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strummolo Admin Panel | Decap CMS</title>
  <link rel="icon" href="https://cur.cursors-4u.net/nature/nat-10/nat926.cur">
  
  <script>
    (function() {
      console.log("📡 Auth Listener attivo e in attesa...");
      
      window.addEventListener("message", (event) => {
        const data = event.data;
        
        // Debug: vediamo cosa arriva
        // console.log("📩 Messaggio ricevuto:", data);

        if (typeof data === 'string' && data.startsWith("authorization:github:success:")) {
          console.log("⚡ Token intercettato con successo!");
          
          const parts = data.split(":");
          const token = parts[3]; 
          
          if (token) {
            const userObj = { backendName: "github", token: token };
            const userStr = JSON.stringify(userObj);
            
            // SALVIAMO SU ENTRAMBE LE CHIAVI PER SICUREZZA (v2 e v3)
            localStorage.setItem("netlify-cms-user", userStr);
            localStorage.setItem("decap-cms-user", userStr);
            
            console.log("💾 Token salvato in LocalStorage. Ricarico tra 200ms...");
            
            // Ricarica forzata
            setTimeout(() => { 
                window.location.reload(); 
            }, 200);
          } else {
            console.error("❌ Errore: Token vuoto nel messaggio ricevuta.");
          }
        }
      });
    })();
  </script>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <!-- Widget Cloudinary (necessario per media_library: cloudinary in config.yml) -->
  <script src="https://media-library.cloudinary.com/global/all.js"></script>

  <script src="https://unpkg.com/decap-cms@^3.1.0/dist/decap-cms.js"></script>

  <script>
    // Registra CSS preview (mirror dello stile reale di /taccuino/[slug])
    CMS.registerPreviewStyle("/admin/preview.css");

    // --- SETUP REACT ---
    const h = window.React ? window.React.createElement : null;

    if (!h) {
        console.error("❌ React non trovato. Decap CMS non caricato correttamente.");
    } else {
        console.log("✅ React caricato. Registro le preview...");

        // --- HELPERS ---
        // Mirror di formatSysDate in src/pages/taccuino/[slug].astro:21
        const formatSysDate = (dateRaw) => {
            if (!dateRaw) return 'YYYY-MM-DD // HH:MM:SS';
            try {
                const d = new Date(dateRaw);
                if (isNaN(d.getTime())) return String(dateRaw);
                return d.toISOString().replace('T', ' // ').substring(0, 19);
            } catch (e) {
                return String(dateRaw);
            }
        };

        // Deterministic fake KB derivato dal titolo (no Math.random => no flicker)
        const fakeKB = (title) => ((title || '').length * 37) % 800 + 10;

        // Slugify-uppercase analog di {title.toUpperCase().replace(/\s/g, '_')}
        const upperUnderscore = (s) => (s || 'UNTITLED').toUpperCase().replace(/\s+/g, '_');

        // --- PREVIEW TACCUINO (articoli) ---
        const PostPreview = (props) => {
            const data = props.entry.get('data');
            const title = data.get('title') || 'Senza Titolo';
            const description = data.get('description') || '';
            const dateRaw = data.get('date');
            const bodyWidget = props.widgetFor('body');

            return h('div', { className: 'jodi-root' },
                // NAV DI SISTEMA (mirror sys-nav in [slug].astro:89-94)
                h('nav', { className: 'sys-nav' },
                    h('a', { href: '#', className: 'sys-btn' }, '!HOME>'),
                    h('span', { className: 'sys-info' }, formatSysDate(new Date().toISOString())),
                    h('a', { href: '#', className: 'sys-btn' }, '/TACCUINO.!)')
                ),
                // WRAPPER FINESTRE
                h('main', { className: 'jodi-window-wrapper' },
                    // BOX 1: DESCRIZIONE
                    h('aside', { className: 'jodi-window window-desc' },
                        h('header', { className: 'window-header' },
                            h('h2', { className: 'file-name' }, 'DESC'),
                            h('span', { className: 'file-size' }, 'READ')
                        ),
                        h('div', { className: 'window-content desc-body' },
                            h('p', null, h('strong', null, '[TITLE]: '), title),
                            h('p', null, h('strong', null, '[DATE]: '), formatSysDate(dateRaw)),
                            h('div', { className: 'desc-text' }, '> ' + description)
                        )
                    ),
                    // BOX 2: CONTENUTO PRINCIPALE
                    h('article', { className: 'jodi-window window-main' },
                        h('header', { className: 'window-header' },
                            h('h1', { className: 'file-name' }, upperUnderscore(title) + '.TXT'),
                            h('span', { className: 'file-size' }, fakeKB(title) + ' KB')
                        ),
                        h('div', { className: 'window-content markdown-body' },
                            bodyWidget
                        )
                    ),
                    // FOOTER
                    h('footer', { className: 'sys-footer' },
                        h('a', { href: '#', className: 'next-link' }, '>> NEXT: [ANTEPRIMA]')
                    )
                )
            );
        };

        // --- PREVIEW PRODOTTI (shop) ---
        const ProductPreview = (props) => {
            const data = props.entry.get('data');
            const title = data.get('title') || 'PRODOTTO SENZA NOME';
            const description = data.get('description') || '';
            const price = data.get('price') || '---';
            const imagesList = data.get('images');
            // Decap passa images come Immutable.List; estraggo array di stringhe
            let images = [];
            if (imagesList && imagesList.toJS) {
                images = imagesList.toJS().filter(Boolean);
            } else if (Array.isArray(imagesList)) {
                images = imagesList.filter(Boolean);
            }
            const firstImg = images[0] || '';
            const seed = title.charCodeAt(0) || 1;
            const rpm = ((seed % 9) + 0.1).toFixed(1);
            const gpm = 1500 + (seed % 400);
            const ft = 20 + (seed % 25);
            const load = 30 + (seed % 50);

            return h('div', { className: 'ics-root' },
                h('div', { className: 'ics-node ics-node-preview' },
                    h('header', { className: 'node-hdr' }, 'NODE: ' + upperUnderscore(title)),
                    h('div', { className: 'node-readouts' },
                        h('span', null, rpm + ' RPM'),
                        h('span', null, gpm + ' GPM'),
                        h('span', null, ft + '.0 FT')
                    ),
                    firstImg
                        ? h('img', { className: 'node-thumb', src: firstImg, alt: title })
                        : h('div', { className: 'node-thumb node-thumb-empty' }, '[NO SIGNAL]'),
                    h('div', { className: 'node-load' }, '% LOAD: ' + load + ' ▮▮▮▯▯'),
                    h('div', { className: 'node-price' }, price),
                    h('div', { className: 'node-desc' }, description),
                    h('div', { className: 'node-gallery' },
                        images.slice(1).map((src, i) =>
                            h('img', { key: i, src: src, alt: title + ' ' + (i + 2), className: 'node-thumb-mini' })
                        )
                    )
                )
            );
        };

        // Registrazione
        CMS.registerPreviewTemplate("taccuino", PostPreview);
        CMS.registerPreviewTemplate("prodotti", ProductPreview);

        // --- BLOCCO INSERIBILE IN ARTICOLI: PRODOTTO SHOP ---
        // Mostra nel bottom toolbar dell'editor markdown un pulsante "Prodotto Shop":
        // l'autore sceglie un prodotto dalla collection 'prodotti' tramite dropdown
        // e nel markdown viene salvato un placeholder <div data-slug="..."> che
        // [slug].astro espande lato runtime nella card prodotto con CTA acquisto.
        CMS.registerEditorComponent({
            id: 'product',
            label: 'Prodotto Shop',
            fields: [{
                label: 'Prodotto',
                name: 'slug',
                widget: 'relation',
                collection: 'prodotti',
                search_fields: ['title'],
                value_field: '{{slug}}',
                display_fields: ['title']
            }],
            pattern: /^<div class="product-embed" data-slug="([^"]+)"><\/div>$/,
            fromBlock: function(match) {
                return { slug: match[1] };
            },
            toBlock: function(data) {
                if (!data || !data.slug) return '';
                return '<div class="product-embed" data-slug="' + data.slug + '"></div>';
            },
            toPreview: function(data) {
                return '<div class="product-embed" data-slug="' + (data.slug || '') + '"></div>';
            }
        });
    }
  </script>

</body>
</html>
